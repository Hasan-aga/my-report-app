services:
  client:
    image: ghcr.io/hasan-aga/my-report-app-client:latest
    depends_on:
      server:
        condition: service_healthy
    restart: always
    networks:
      - caddy
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  server:
    image: ghcr.io/hasan-aga/my-report-app-server:latest
    environment:
      - PORT=5002
      - NODE_ENV=production
    restart: always
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5002/api/test"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  watchtower:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_POLL_INTERVAL=300
      - WATCHTOWER_CLEANUP=true
    restart: always

networks:
  caddy:
    external: true
  internal:
    driver: bridge
